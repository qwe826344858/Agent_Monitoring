services:
  agent-monitor:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CLAUDE_DIR=/data/.claude
    volumes:
      - ./static:/app/static
      - ~/.claude/teams:/data/.claude/teams:ro
      - ~/.claude/tasks:/data/.claude/tasks:ro
      - ~/.claude/projects:/data/.claude/projects:ro
    restart: unless-stopped
