<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Teams 监控面板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slate: {
              850: '#172033',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-900 text-gray-200 min-h-screen font-sans">

  <!-- ========== 首屏：团队选择页 ========== -->
  <div id="team-select-page" class="min-h-screen flex flex-col">
    <!-- 顶部标题 -->
    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4">
      <h1 class="text-xl font-bold text-blue-400 tracking-wide">Agent Teams 监控面板</h1>
      <p class="text-sm text-slate-400 mt-1">选择一个团队开始监控</p>
    </header>

    <!-- 团队卡片列表 -->
    <main class="flex-1 p-6">
      <div id="teams-grid" class="max-w-5xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
        <!-- 加载占位 -->
        <div class="col-span-full text-center text-slate-500 py-20">
          <svg class="animate-spin h-8 w-8 mx-auto mb-3 text-slate-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          正在加载团队列表...
        </div>
      </div>
    </main>
  </div>

  <!-- ========== Dashboard 页 ========== -->
  <div id="dashboard-page" class="h-screen flex flex-col overflow-hidden hidden">
    <!-- 顶部导航栏 -->
    <header class="bg-slate-800 border-b border-slate-700 px-4 py-3 flex items-center justify-between shrink-0 z-50">
      <div class="flex items-center gap-4">
        <button id="btn-back" class="text-slate-400 hover:text-white transition-colors flex items-center gap-1 text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          返回
        </button>
        <div class="h-5 w-px bg-slate-700"></div>
        <h1 id="dashboard-team-name" class="text-lg font-semibold text-blue-400"></h1>
      </div>
      <div class="flex items-center gap-4">
        <span id="ws-status" class="text-xs flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-slate-700/50">
          <span id="ws-status-dot" class="w-2 h-2 rounded-full bg-gray-500"></span>
          <span id="ws-status-text">未连接</span>
        </span>
        <button id="btn-refresh" class="text-slate-400 hover:text-white transition-colors p-1.5 rounded hover:bg-slate-700" title="刷新数据">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
      </div>
    </header>

    <!-- Dashboard 两栏布局：填满剩余高度，左右独立滚动 -->
    <main class="flex-1 flex min-h-0 overflow-hidden">
      <!-- 左栏 -->
      <div class="flex-1 min-h-0 overflow-y-auto p-4 space-y-4 custom-scroll" id="left-column">
        <!-- 成员状态卡片 -->
        <section class="bg-slate-800/50 rounded-lg border border-slate-700 overflow-hidden">
          <div class="px-4 py-2.5 border-b border-slate-700 sticky top-0 bg-slate-800 z-10">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">成员状态</h2>
          </div>
          <div class="p-3 max-h-[320px] overflow-y-auto custom-scroll">
            <div id="members-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3">
              <p class="text-slate-500 text-sm col-span-full text-center py-8">加载中...</p>
            </div>
          </div>
        </section>

        <!-- 任务看板 -->
        <section class="bg-slate-800/50 rounded-lg border border-slate-700 overflow-hidden">
          <div class="px-4 py-2.5 border-b border-slate-700 sticky top-0 bg-slate-800 z-10">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">任务看板</h2>
          </div>
          <div class="p-3 max-h-[400px] overflow-y-auto custom-scroll">
            <div class="grid grid-cols-3 gap-3">
              <!-- 待分配 -->
              <div class="bg-slate-900/50 rounded-lg overflow-hidden border border-slate-700/50">
                <div class="h-1 bg-blue-500"></div>
                <div class="px-3 py-2 border-b border-slate-700/50 flex items-center justify-between">
                  <span class="text-xs font-semibold text-blue-400">待分配</span>
                  <span id="kanban-pending-count" class="text-xs bg-blue-500/20 text-blue-400 px-1.5 py-0.5 rounded-full min-w-[1.25rem] text-center">0</span>
                </div>
                <div id="kanban-pending" class="p-2 space-y-2 min-h-[60px] max-h-[280px] overflow-y-auto custom-scroll"></div>
              </div>
              <!-- 进行中 -->
              <div class="bg-slate-900/50 rounded-lg overflow-hidden border border-slate-700/50">
                <div class="h-1 bg-yellow-500"></div>
                <div class="px-3 py-2 border-b border-slate-700/50 flex items-center justify-between">
                  <span class="text-xs font-semibold text-yellow-400">进行中</span>
                  <span id="kanban-progress-count" class="text-xs bg-yellow-500/20 text-yellow-400 px-1.5 py-0.5 rounded-full min-w-[1.25rem] text-center">0</span>
                </div>
                <div id="kanban-in-progress" class="p-2 space-y-2 min-h-[60px] max-h-[280px] overflow-y-auto custom-scroll"></div>
              </div>
              <!-- 已完成 -->
              <div class="bg-slate-900/50 rounded-lg overflow-hidden border border-slate-700/50">
                <div class="h-1 bg-green-500"></div>
                <div class="px-3 py-2 border-b border-slate-700/50 flex items-center justify-between">
                  <span class="text-xs font-semibold text-green-400">已完成</span>
                  <span id="kanban-done-count" class="text-xs bg-green-500/20 text-green-400 px-1.5 py-0.5 rounded-full min-w-[1.25rem] text-center">0</span>
                </div>
                <div id="kanban-completed" class="p-2 space-y-2 min-h-[60px] max-h-[280px] overflow-y-auto custom-scroll"></div>
              </div>
            </div>
          </div>
        </section>

        <!-- Token 消耗统计 -->
        <section class="bg-slate-800/50 rounded-lg border border-slate-700 overflow-hidden">
          <div class="px-4 py-2.5 border-b border-slate-700 sticky top-0 bg-slate-800 z-10">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Token 消耗</h2>
          </div>
          <div class="p-4 max-h-[400px] overflow-y-auto custom-scroll">
            <div id="tokens-content">
              <p class="text-slate-500 text-sm text-center py-4">加载中...</p>
            </div>
          </div>
        </section>
      </div>

      <!-- 右栏：实时通信流 -->
      <div class="w-[420px] xl:w-[480px] border-l border-slate-700 flex flex-col bg-slate-800/50 shrink-0 overflow-hidden">
        <div class="px-4 py-2.5 border-b border-slate-700 shrink-0">
          <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">实时通信流</h2>
        </div>
        <div id="messages-timeline" class="min-h-0 flex-1 overflow-y-auto px-4 py-3 space-y-3 custom-scroll">
          <p class="text-slate-500 text-sm text-center py-8">加载中...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
